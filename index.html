<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="1978 Space Invaders–style HTML5 arcade clone for mobile." />
    <title>Space Invaders</title>
    <link rel="stylesheet" href="style.css?v=20260717-cab1" />
  </head>
  <body>
    <div class="app-shell">
      <main class="game-area">
        <canvas id="gameCanvas" aria-label="Space Invaders arcade canvas"></canvas>
        <div id="hud" aria-live="polite">
          <div id="scoreLine">SCORE <span id="scoreValue">0000</span></div>
          <div id="bestLine">HI <span id="bestValue">0000</span></div>
          <div id="levelLine">WAVE <span id="levelValue">1</span></div>
          <div id="livesLine">LIVES <span id="livesValue">3</span></div>
        </div>
        <div id="overlay" class="overlay">
          <div class="overlay-inner">
            <h1 id="overlayTitle">SPACE INVADERS</h1>
            <p id="overlayBody">
              DESTROY THE INVADERS<br />
              L/R · FIRE · DEFEND EARTH
            </p>
            <button id="startButton" type="button">INSERT COIN / START</button>
          </div>
        </div>
        <div id="touchControls">
          <div class="left-controls">
            <button id="leftBtn" class="control-btn" type="button" aria-label="left">&lt;</button>
            <button id="rightBtn" class="control-btn" type="button" aria-label="right">&gt;</button>
          </div>
          <button id="fireBtn" class="control-btn fire-btn" type="button">FIRE</button>
          <button id="pauseBtn" class="control-btn" type="button">II</button>
        </div>
      </main>
    </div>
    <script src="game.js?v=20260717-cab1"></script>
  </body>
</html>
